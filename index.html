    <!-- Tema yanıp sönmesini önle: render öncesi data-theme ayarla -->
    <script>
      (function () {
        try {
          var modes = ["system", "light", "dark"];
          var m = localStorage.getItem("gp_theme");
          if (modes.indexOf(m) < 0) m = "system";
          var dark =
            m === "dark" ||
            (m === "system" &&
              window.matchMedia &&
              window.matchMedia("(prefers-color-scheme: dark)").matches);
          document.documentElement.setAttribute(
            "data-theme",
            dark ? "dark" : "light"
          );
        } catch (e) {
          document.documentElement.setAttribute("data-theme", "dark");
        }
      })();
    </script>

    <style>
      /* ============================================================
         GENÇ PETROL — Tasarım Sistemi (Design Tokens)
         ============================================================ */
      :root {
        /* ---- Marka rengi (vurgu) ---- */
        --accent: #296445; /* Genç Petrol yeşili (logo) */
        --accent-press: color-mix(in srgb, var(--accent) 82%, #000);
        --accent-tint: color-mix(in srgb, var(--accent) 14%, transparent);
        --accent-line: color-mix(in srgb, var(--accent) 38%, transparent);
        --accent-ink: #ffffff; /* vurgu üzerindeki yazı */

        /* ---- Yarıçap ---- */
        --r-sm: 10px;
        --r-md: 16px;
        --r-lg: 22px;
        --r-pill: 999px;

        /* ---- Tipografi ---- */
        --font-display: "Newsreader", Georgia, "Times New Roman", serif;
        --font-ui: "Hanken Grotesk", ui-sans-serif, system-ui, -apple-system,
          sans-serif;

        --fs-eyebrow: 12px;
        --fs-label: 12.5px;
        --fs-value: 17px;
        --fs-body: 15px;
        --fs-h2: 20px;
        --fs-display: clamp(40px, 13vw, 56px);

        /* ---- Spacing skalası (8'lik ritim) ---- */
        --s-1: 4px;
        --s-2: 8px;
        --s-3: 12px;
        --s-4: 16px;
        --s-5: 24px;
        --s-6: 32px;
        --s-7: 48px;
        --s-8: 64px;

        /* ---- Gölge ---- */
        --shadow-card: 0 1px 0 rgba(255, 255, 255, 0.04) inset,
          0 18px 40px -24px rgba(0, 0, 0, 0.7);
        --shadow-pop: 0 12px 30px -10px rgba(0, 0, 0, 0.55);
      }

      /* ---- KOYU TEMA (varsayılan) — koyu orman yeşili ---- */
      :root,
      [data-theme="dark"] {
        --bg: #0a1610;
        --bg-grad-a: #0e2017;
        --bg-grad-b: #07110b;
        --surface: #102619;
        --surface-2: #163021;
        --raised: #16302180;
        --ink: #eaf3ec;
        --ink-muted: #9fb8a8;
        --ink-faint: #678173;
        --line: rgba(255, 255, 255, 0.08);
        --line-strong: rgba(255, 255, 255, 0.14);
        --row-hover: rgba(255, 255, 255, 0.035);
      }

      /* ---- AÇIK TEMA — yumuşak fildişi-yeşil ---- */
      [data-theme="light"] {
        --bg: #eef2ea;
        --bg-grad-a: #f2f5ee;
        --bg-grad-b: #e6ebe0;
        --surface: #ffffff;
        --surface-2: #f4f7f1;
        --raised: #ffffff;
        --ink: #18241c;
        --ink-muted: #56685c;
        --ink-faint: #899483;
        --line: rgba(24, 36, 28, 0.1);
        --line-strong: rgba(24, 36, 28, 0.18);
        --row-hover: rgba(24, 36, 28, 0.025);
        --shadow-card: 0 1px 0 rgba(255, 255, 255, 0.6) inset,
          0 20px 44px -28px rgba(26, 46, 34, 0.4);
        --shadow-pop: 0 14px 32px -12px rgba(26, 46, 34, 0.3);
      }

      /* ============================================================
         Sayfa
         ============================================================ */
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html {
        background-color: var(--bg);
        transition: background-color 0.45s ease;
      }

      body {
        font-family: var(--font-ui);
        color: var(--ink);
        background: radial-gradient(
          120% 80% at 50% -10%,
          var(--bg-grad-a) 0%,
          var(--bg) 55%,
          var(--bg-grad-b) 100%
        );
        -webkit-font-smoothing: antialiased;
        text-rendering: optimizeLegibility;
        transition: background 0.45s ease, color 0.45s ease;
      }

      ::selection {
        background: var(--accent-tint);
      }

      .stage {
        min-height: 100dvh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: clamp(14px, 4vw, 30px);
      }

      /* ---------------- Card ---------------- */
      .card {
        width: 100%;
        max-width: 452px;
        background: linear-gradient(
          180deg,
          color-mix(in srgb, var(--surface) 96%, white 4%) 0%,
          var(--surface) 38%,
          var(--surface) 100%
        );
        border: 1px solid var(--line);
        border-radius: var(--r-lg);
        box-shadow: var(--shadow-card);
        padding: clamp(20px, 6vw, 30px);
        position: relative;
        overflow: hidden;
      }
      /* ince üst aksan çizgisi */
      .card::before {
        content: "";
        position: absolute;
        inset: 0 0 auto 0;
        height: 3px;
        background: linear-gradient(
          90deg,
          transparent,
          var(--accent),
          transparent
        );
        opacity: 0.85;
      }

      /* ---------------- Topbar ---------------- */
      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: var(--s-3);
      }
      .topbar__brand {
        display: flex;
        align-items: center;
        gap: var(--s-3);
      }
      .topbar__name {
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.18em;
        color: var(--ink-muted);
      }
      .topbar__actions {
        display: flex;
        align-items: center;
        gap: var(--s-2);
      }
      .themebtn {
        display: inline-grid;
        place-items: center;
        width: 34px;
        height: 34px;
        flex: none;
        color: var(--ink-muted);
        background: var(--row-hover);
        border: 1px solid var(--line);
        border-radius: var(--r-pill);
        cursor: pointer;
        transition: color 0.2s ease, border-color 0.2s ease, background 0.2s ease;
      }
      .themebtn:hover {
        color: var(--accent);
        border-color: var(--accent-line);
        background: var(--accent-tint);
      }
      .themebtn:active {
        transform: scale(0.94);
      }
      .themebtn svg {
        display: block;
      }

      .brandmark {
        display: inline-grid;
        place-items: center;
        background: var(--accent);
        border-radius: 10px;
        box-shadow: 0 6px 16px -6px var(--accent-line);
        flex: none;
      }
      /* Logo: yeşil rozet üzerinde beyaz logo (inline SVG, currentColor) */
      .brandmark__logo {
        width: 62%;
        height: 62%;
        color: #fff;
        display: grid;
        place-items: center;
      }
      .brandmark__logo svg {
        width: 100%;
        height: 100%;
        display: block;
      }
      .foot .brandmark {
        opacity: 0.9;
      }

      /* ---------------- Lang toggle ---------------- */
      .lang {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        padding: 5px 9px;
        border: 1px solid var(--line);
        border-radius: var(--r-pill);
        background: var(--row-hover);
      }
      .lang__btn {
        font: inherit;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.04em;
        color: var(--ink-faint);
        background: none;
        border: 0;
        cursor: pointer;
        padding: 1px 3px;
        border-radius: 6px;
        transition: color 0.2s ease;
      }
      .lang__btn.is-on {
        color: var(--accent);
      }
      .lang__btn:hover {
        color: var(--ink);
      }
      .lang__btn.is-on:hover {
        color: var(--accent);
      }
      .lang__sep {
        color: var(--ink-faint);
        font-size: 11px;
      }

      /* ---------------- Hero ---------------- */
      .hero {
        padding: clamp(26px, 8vw, 38px) 0 clamp(18px, 5vw, 24px);
      }
      .hero__eyebrow {
        font-size: var(--fs-eyebrow);
        font-weight: 600;
        letter-spacing: 0.24em;
        color: var(--accent);
        margin-bottom: var(--s-4);
      }
      .hero__name {
        font-family: var(--font-display);
        font-weight: 500;
        font-size: var(--fs-display);
        line-height: 0.98;
        letter-spacing: -0.015em;
        color: var(--ink);
      }
      .hero__legal {
        margin-top: var(--s-3);
        font-size: clamp(16px, 4.6vw, 19px);
        font-weight: 500;
        line-height: 1.4;
        color: var(--ink-muted);
        max-width: 26ch;
        text-wrap: balance;
      }
      .hero__copyname {
        margin-top: var(--s-4);
        display: inline-flex;
        align-items: center;
        gap: 6px;
        font: inherit;
        font-size: 12.5px;
        font-weight: 600;
        color: var(--ink-faint);
        background: none;
        border: 0;
        padding: 3px 0;
        white-space: nowrap;
        cursor: pointer;
        transition: color 0.2s ease;
      }
      .hero__copyname svg {
        width: 14px;
        height: 14px;
        opacity: 0.85;
      }
      .hero__copyname span {
        text-underline-offset: 3px;
      }
      .hero__copyname:hover {
        color: var(--ink-muted);
      }
      .hero__copyname:hover span {
        text-decoration: underline;
      }
      .hero__copyname.is-copied {
        color: var(--accent);
      }
      .hero__copyname.is-copied span {
        text-decoration: none;
      }

      /* ---------------- Rule ---------------- */
      .rule {
        height: 1px;
        background: var(--line);
        position: relative;
      }
      .rule span {
        position: absolute;
        left: 0;
        top: -1px;
        height: 3px;
        width: 44px;
        background: var(--accent);
        border-radius: 3px;
      }

      /* ---------------- Info ---------------- */
      .info {
        padding-top: clamp(20px, 6vw, 26px);
      }
      .info__head {
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        gap: 6px;
        margin-bottom: var(--s-4);
      }
      .info__title {
        font-family: var(--font-display);
        font-weight: 500;
        font-size: clamp(18px, 4.8vw, 21px);
        line-height: 1.15;
        letter-spacing: -0.01em;
        color: var(--ink);
        white-space: nowrap;
      }
      .info__hint {
        font-size: 12px;
        color: var(--ink-faint);
        font-weight: 500;
        margin-top: 1px;
      }

      .rows {
        list-style: none;
        display: flex;
        flex-direction: column;
        gap: var(--s-2);
      }
      .row {
        display: flex;
        align-items: stretch;
        gap: 0;
        border: 1px solid var(--line);
        border-radius: var(--r-md);
        background: var(--surface-2);
        overflow: hidden;
        transition: border-color 0.2s ease, transform 0.12s ease;
      }
      .row:hover {
        border-color: var(--line-strong);
      }
      .row:active {
        transform: scale(0.992);
      }

      .row__copy {
        flex: 1 1 auto;
        display: flex;
        align-items: center;
        gap: var(--s-3);
        text-align: left;
        font: inherit;
        color: var(--ink);
        background: none;
        border: 0;
        cursor: pointer;
        padding: 13px var(--s-4);
        min-width: 0;
        transition: background 0.18s ease;
      }
      .row__copy:hover {
        background: var(--row-hover);
      }

      .row__text {
        display: flex;
        flex-direction: column;
        gap: 3px;
        min-width: 0;
        flex: 1;
      }
      .row__label {
        font-size: var(--fs-label);
        font-weight: 600;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--ink-faint);
      }
      .row__value {
        font-size: var(--fs-value);
        font-weight: 500;
        line-height: 1.4;
        color: var(--ink);
        letter-spacing: -0.005em;
        overflow-wrap: anywhere;
        word-break: break-word;
      }
      .row__value.multi {
        font-size: 15px;
        font-weight: 500;
        line-height: 1.45;
      }
      .row__value.mono {
        font-variant-numeric: tabular-nums;
        letter-spacing: 0.02em;
      }

      .row__icon {
        flex: none;
        align-self: center;
        display: inline-flex;
        align-items: center;
        color: var(--ink-faint);
        transition: color 0.2s ease;
      }
      .row__copy:hover .row__icon {
        color: var(--ink-muted);
      }
      .row__icon-stack {
        display: inline-flex;
      }
      .row__copy.is-copied .row__icon {
        color: var(--accent);
      }

      .row__act {
        flex: none;
        width: 50px;
        display: grid;
        place-items: center;
        color: var(--ink-faint);
        border-left: 1px solid var(--line);
        background: none;
        text-decoration: none;
        transition: color 0.2s ease, background 0.18s ease;
      }
      .row__act:hover {
        color: var(--accent);
        background: var(--accent-tint);
      }

      /* ---- Kopya/onay ikon geçişi ---- */
      .ico-check {
        display: none;
      }
      .is-copied .ico-copy {
        display: none;
      }
      .is-copied .ico-check {
        display: inline-flex;
      }

      /* ---------------- Foot ---------------- */
      .foot {
        margin-top: clamp(22px, 6vw, 30px);
        padding-top: var(--s-4);
        border-top: 1px solid var(--line);
        display: flex;
        align-items: center;
        gap: var(--s-3);
        font-size: 12px;
        color: var(--ink-faint);
        font-weight: 500;
      }

      /* ---------------- Toast ---------------- */
      .toast {
        position: fixed;
        left: 50%;
        bottom: 26px;
        transform: translate(-50%, 14px);
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 11px 18px;
        background: var(--accent);
        color: var(--accent-ink);
        border-radius: var(--r-pill);
        font-size: 13.5px;
        font-weight: 600;
        box-shadow: var(--shadow-pop);
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.24s ease, transform 0.24s ease;
        z-index: 50;
      }
      .toast.is-on {
        opacity: 1;
        transform: translate(-50%, 0);
      }
      .toast svg {
        width: 16px;
        height: 16px;
      }

      @media (prefers-reduced-motion: reduce) {
        * {
          transition: none !important;
        }
      }
    </style>
  </head>

          var label = dict().themePrefix + dict().themeName[mode];
          btn.title = label;
          btn.setAttribute("aria-label", label);
        }
        function cycleTheme() {
          mode = THEME_MODES[(THEME_MODES.indexOf(mode) + 1) % THEME_MODES.length];
          try {
            localStorage.setItem(THEME_KEY, mode);
          } catch (e) {}
          applyTheme();
        }

        /* ---------------- Dil ---------------- */
        function detectLang() {
          try {
            var s = localStorage.getItem(LANG_KEY);
            if (s === "tr" || s === "en") return s;
          } catch (e) {}
          var n = (
            (navigator.languages && navigator.languages[0]) ||
            navigator.language ||
            "tr"
          ).toLowerCase();
          return n.indexOf("en") === 0 ? "en" : "tr";
        }
        var lang = detectLang();

        function setText(id, txt) {
          var el = byId(id);
          if (el) el.textContent = txt;
        }
        function applyLang() {
          var d = dict();
          document.documentElement.lang = lang;
          setText("eyebrow", d.eyebrow);
          setText("legal", d.legal);
          setText("section-title", d.sectionTitle);
          setText("hint", d.hint);
          setText("label-address", d.labels.address);
          setText("label-taxoffice", d.labels.taxoffice);
          setText("label-taxno", d.labels.taxno);
          setText("label-phone", d.labels.phone);
          setText("label-email", d.labels.email);
          if (!copiedName) setText("copyname-text", d.copyName);
          setText("toast-text", d.copied);
          // İkincil eylem aria etiketleri
          var aa = byId("act-address");
          if (aa) aa.setAttribute("aria-label", d.act.address);
          var ap = byId("act-phone");
          if (ap) ap.setAttribute("aria-label", d.act.phone);
          var ae = byId("act-email");
          if (ae) ae.setAttribute("aria-label", d.act.email);
          // Dil düğmeleri
          byId("lang-tr").classList.toggle("is-on", lang === "tr");
          byId("lang-en").classList.toggle("is-on", lang === "en");
          applyTheme(); // tema etiketi de dile bağlı
        }
        function setLang(l) {
          if (l === lang) return;
          lang = l;
          try {
            localStorage.setItem(LANG_KEY, lang);
          } catch (e) {}
          applyLang();
        }

        /* ---------------- Kopyalama ---------------- */
        function copyText(text) {
          if (navigator.clipboard && navigator.clipboard.writeText) {
            return navigator.clipboard.writeText(text).then(
              function () {
                return true;
              },
              function () {
                return fallbackCopy(text);
              }
            );
          }
          return Promise.resolve(fallbackCopy(text));
        }
        function fallbackCopy(text) {
          try {
            var ta = document.createElement("textarea");
            ta.value = text;
            ta.style.position = "fixed";
            ta.style.opacity = "0";
            document.body.appendChild(ta);
            ta.select();
            document.execCommand("copy");
            ta.remove();
            return true;
          } catch (e) {
            return false;
          }
        }

        var toastTimer = null;
        function showToast() {
          var t = byId("toast");
          t.classList.add("is-on");
          clearTimeout(toastTimer);
          toastTimer = setTimeout(function () {
            t.classList.remove("is-on");
          }, 1700);
        }

        var copyTimer = null;
        var copiedName = false;
        function flashCopied(el) {
          el.classList.add("is-copied");
          showToast();
          clearTimeout(copyTimer);
          copyTimer = setTimeout(function () {
            var copied = document.querySelectorAll(".is-copied");
            for (var i = 0; i < copied.length; i++)
              copied[i].classList.remove("is-copied");
            copiedName = false;
            setText("copyname-text", dict().copyName);
          }, 1700);
        }

        function bindCopy(btn) {
          btn.addEventListener("click", function () {
            var val = btn.getAttribute("data-copy") || "";
            if (!val) return;
            copyText(val).then(function (ok) {
              if (ok) flashCopied(btn);
            });
          });
        }

        /* ---------------- E-posta çözme (botlardan gizli) ---------------- */
        function decodeEmail() {
          var ev = byId("email-value");
          if (!ev) return;
          var user = ev
            .getAttribute("data-user")
            .split("")
            .reverse()
            .join("");
          var domain = ev
            .getAttribute("data-domain")
            .split("")
            .reverse()
            .join("");
          var email = user + "@" + domain;
          ev.textContent = email;
          byId("email-copy").setAttribute("data-copy", email);
          byId("email-act").setAttribute("href", "mailto:" + email);
        }

        /* ---------------- Başlat ---------------- */
        function init() {
          byId("foot-year").textContent = new Date().getFullYear();

          decodeEmail();

          var copyBtns = document.querySelectorAll(".row__copy");
          for (var i = 0; i < copyBtns.length; i++) bindCopy(copyBtns[i]);

          byId("copyname-btn").addEventListener("click", function () {
            copyText(LEGAL_FULL).then(function (ok) {
              if (!ok) return;
              copiedName = true;
              var b = byId("copyname-btn");
              setText("copyname-text", dict().copied);
              flashCopied(b);
            });
          });

          byId("theme-btn").addEventListener("click", cycleTheme);
          byId("lang-tr").addEventListener("click", function () {
            setLang("tr");
          });
          byId("lang-en").addEventListener("click", function () {
            setLang("en");
          });

          // Sistem teması değişirse (system modunda) anında yansıt
          if (window.matchMedia) {
            var mq = window.matchMedia("(prefers-color-scheme: dark)");
            var onChange = function () {
              if (mode === "system") applyTheme();
            };
            if (mq.addEventListener) mq.addEventListener("change", onChange);
            else if (mq.addListener) mq.addListener(onChange);
          }

          applyLang(); // applyTheme'i de çağırır
        }

        if (document.readyState === "loading")
          document.addEventListener("DOMContentLoaded", init);
        else init();
      })();
    </script>
  </body>
</html>
